<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Jo Jo's Windows LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --white:#ffffff; --off:#f5f5f3; --dark:#111111; --mid:#444444; --accent:#2a7de1; }
  body { font-family: 'Barlow', sans-serif; color: var(--dark); background: var(--white); }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--dark); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  .back-link { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--mid); text-decoration: none; }
  .back-link:hover { color: var(--accent); }

  .gallery-hero { padding: 60px 40px 40px; max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(32px, 5vw, 52px); font-weight: 800; text-transform: uppercase; line-height: 1; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 1100px; margin: 40px auto 80px; padding: 0 40px; }
  .grid-item { aspect-ratio: 4/3; overflow: hidden; cursor: pointer; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease; }
  .grid-item:hover img { transform: scale(1.04); }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 999; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }
  .lightbox-close { position: absolute; top: 20px; right: 28px; color: white; font-size: 36px; cursor: pointer; line-height: 1; }
  .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; padding: 16px; user-select: none; }
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }

  footer { background: #0a0a0a; padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: white; }
  .footer-logo span { color: var(--accent); }
  .footer-info { font-size: 13px; color: rgba(255,255,255,.4); }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .gallery-hero { padding: 40px 20px 24px; }
    .grid { grid-template-columns: repeat(2, 1fr); padding: 0 20px; gap: 6px; }
    footer { padding: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">JO JO'S <span>WINDOWS</span></a>
  <a href="index.html" class="back-link">← Back</a>
</nav>

<div class="gallery-hero">
  <p class="section-label">By The Owner</p>
  <h1 class="section-title">Our Work</h1>
</div>

<div class="grid" id="galleryGrid">
  <div class="grid-item" onclick="openLightbox(0)"><img src="photos/photo1.jpg" alt="Window cleaning"></div>
  <div class="grid-item" onclick="openLightbox(1)"><img src="photos/photo2.jpg" alt="Window cleaning"></div>
  <div class="grid-item" onclick="openLightbox(2)"><img src="photos/photo3.jpg" alt="Window cleaning"></div>
  <div class="grid-item" onclick="openLightbox(3)"><img src="photos/photo4.jpg" alt="Window cleaning"></div>
  <div class="grid-item" onclick="openLightbox(4)"><img src="photos/photo5.jpg" alt="Window cleaning"></div>
  <div class="grid-item" onclick="openLightbox(5)"><img src="photos/photo6.jpg" alt="Window cleaning"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <span class="lightbox-prev" onclick="shiftLightbox(-1)">‹</span>
  <img id="lightboxImg" src="" alt="">
  <span class="lightbox-next" onclick="shiftLightbox(1)">›</span>
</div>

<footer>
  <div class="footer-logo">JO JO'S <span>WINDOWS</span> LLC</div>
  <div class="footer-info">(406) 609-6393 · Montana · Open until 6 PM</div>
</footer>

<script>
  const photos = ['photos/photo1.jpg','photos/photo2.jpg','photos/photo3.jpg','photos/photo4.jpg','photos/photo5.jpg','photos/photo6.jpg'];
  let current = 0;

  function openLightbox(i) {
    current = i;
    document.getElementById('lightboxImg').src = photos[i];
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  function shiftLightbox(dir) {
    current = (current + dir + photos.length) % photos.length;
    document.getElementById('lightboxImg').src = photos[current];
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') shiftLightbox(1);
    if (e.key === 'ArrowLeft') shiftLightbox(-1);
  });
</script>

</body>
</html>
